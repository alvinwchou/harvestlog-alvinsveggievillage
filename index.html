<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title data-en="Harvest Log" data-es="Bitácora de Cosecha">Harvest Log</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
  <h1 data-en="Today's Harvest Tasks" data-es="Tareas de Cosecha de Hoy
  :">Today's Harvest Tasks</h1>
  <input type="date" id="date-selector">
  <div id="task-list"></div>

  <div id="detail-container" class="detail-container" style="width: 100%; height: 100%;display:none">
    <div id="detail-form" class="detail-form">
      <div id="detail-form-top"></div>
      <div class="detail-form-header">
        <div>
          <h2 id="detail-title"></h2>
        </div>
        <div>
          <button class="detail-form-close-button" onclick="closeForm()">X</button>
        </div>
      </div>

      <p><strong data-en="Location:" data-es="Ubicación:">Location:</strong> <span id="detail-location"></span></p>
      <p><strong data-en="Total Quantity:" data-es="Cantidad Total:">Total Quantity</strong> <span
          id="detail-quantity"></span></p>
      <div id="sales-breakdown" class="sales-breakdown"></div>

      <label for="assignee" data-en="Assignee(s):" data-es="Asignado:">Assignee(s)</label>
      <select id="assignee" multiple>
        <!-- <option value="" data-en="-- Select --" data-es="-- Seleccionar --" disabled>-- Select --</option> -->
      </select>

      <label for="harvestTime" data-en="Time to Harvest (mins)" data-es="Tiempo de Cosecha (min)">Time to Harvest
        (mins)</label>
      <input id="harvestTime" type="number" />

      <label for="weight" data-en="Total Harvest Weight (kg)" data-es="Peso Total de Cosecha (kg)">Total Harvest Weight
        (kg)</label>
      <input id="weight" type="number" />

      <label for="washPackTime" data-en="Time to Wash & Pack (mins)" data-es="Tiempo de Lavado y Empaque (min)">Time to
        Wash & Pack (mins)</label>
      <input id="washPackTime" type="number" />

      <label for="notes" data-en="Field Crew Notes" data-es="Notas del Equipo de Campo">Field Crew Notes</label>
      <textarea id="notes" data-en-placeholder="Optional observations..."
        data-es-placeholder="Observaciones opcionales..." placeholder="Optional observations..."></textarea>

      <!-- ✅ New Buttons -->
      <button type="button" id="update-btn" data-en="Update" data-es="Actualizar">Update</button>
      <button type="button" id="complete-btn" data-en="Mark Completed" data-es="Marcar Completado">Mark
        Completed</button>
      <!-- <button type="button" onclick="closeForm()">Cancel / Cancelar</button> -->
    </div>
  </div>

  <div class="lang-toggle">
    <button id="en-button" class="active">EN</button>
    <button id="es-button">ES</button>
  </div>

  <script src="script.js"></script>
</body>

</html>
